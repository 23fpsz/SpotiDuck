name: Rolling Beta Build

on:
  push:
    branches: [ "main", "master" ]
    tags-ignore:
      - 'v*' # Don't run this when pushing an official release tag
    paths-ignore:
      - 'app/src/main/assets/**'
      - 'scripts/publish-hotfix.js'
      - '.github/workflows/hotfix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
      run: |
        if [ -n "$RELEASE_KEYSTORE" ]; then
          printf "%s" "$RELEASE_KEYSTORE" | base64 -di > release.keystore
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APKs
      env:
        RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew assembleDebug assembleRelease

    - name: Prepare APKs for Upload
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p outputs
        # Delete the old release and tag so the new build is created fresh and promoted to the top of the page
        gh release delete latest-beta --yes --cleanup-tag || true
        # Copy the dynamically named APKs preserving their filenames
        find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} outputs/ \;
        find app/build/outputs/apk/release/ -name "*.apk" -exec cp {} outputs/ \;

    - name: Update Latest Beta Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-beta
        name: "Latest Beta Build"
        body: |
          This is an automated rolling build of the latest commit.
          
          *Last updated: ${{ github.event.head_commit.timestamp }}*
          *Commit: ${{ github.sha }}*
        draft: false
        prerelease: true
        files: |
          outputs/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
